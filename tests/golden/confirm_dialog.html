<dialog id="g" class="px-confirm-dialog" data-px-dialog="confirm" aria-modal="true" aria-labelledby="g-message">
    <div class="px-confirm-dialog__card">
        <p id="g-message" class="px-confirm-dialog__message"></p>
        <div class="px-confirm-dialog__actions">
            <button type="button" class="px-confirm-dialog__cancel">Cancel</button>
            <button type="button" class="px-confirm-dialog__ok">Confirm</button>
        </div>
    </div>
</dialog>
