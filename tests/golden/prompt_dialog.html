<dialog id="g" class="px-prompt-dialog" data-px-dialog="prompt" aria-modal="true">
    <form method="dialog" class="px-prompt-dialog__card">
        <label class="px-prompt-dialog__label" for="g-input">Name</label>
        <input id="g-input" class="px-prompt-dialog__input" type="text" autocomplete="off" />
        <div class="px-prompt-dialog__actions">
            <button type="button" class="px-prompt-dialog__cancel">Cancel</button>
            <button type="submit" class="px-prompt-dialog__ok">OK</button>
        </div>
    </form>
</dialog>
