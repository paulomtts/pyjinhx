<dialog id="g" class="pjx-prompt-dialog" data-pjx-dialog="prompt" aria-modal="true" aria-labelledby="g-label">
    <form method="dialog" class="pjx-prompt-dialog__card">
        <label id="g-label" class="pjx-prompt-dialog__label" for="g-input">Name</label>
        <input id="g-input" class="pjx-prompt-dialog__input" type="text" autocomplete="off" />
        <div class="pjx-prompt-dialog__actions">
            <button type="button" class="pjx-prompt-dialog__cancel">Cancel</button>
            <button type="submit" class="pjx-prompt-dialog__ok">OK</button>
        </div>
    </form>
</dialog>
