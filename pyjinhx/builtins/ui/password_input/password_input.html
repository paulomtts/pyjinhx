<div id="{{ id }}" class="px-password-input{% if class_name %} {{ class_name }}{% endif %}" data-px-password{% for k, v in extra_attrs.items() %} {{ k }}="{{ v }}"{% endfor %}>
  <input type="password" class="px-password-input__field" id="{{ id }}-field" name="{{ name }}"{% if placeholder %} placeholder="{{ placeholder }}"{% endif %}{% if autocomplete %} autocomplete="{{ autocomplete }}"{% endif %}{% if required %} required{% endif %}>
  <button type="button" class="px-password-input__toggle" data-px-password-toggle data-show-label="{{ show_label }}" data-hide-label="{{ hide_label }}" aria-label="{{ show_label }}" aria-pressed="false"><span class="px-password-input__eye" aria-hidden="true"></span></button>
</div>
