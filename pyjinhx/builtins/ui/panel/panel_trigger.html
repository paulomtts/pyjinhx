<div id="{{ id }}"
     class="px-panel-trigger{% if class_name %} {{ class_name }}{% endif %}"
     role="tab"
     data-px-panel-id="{{ panel_id }}"
     data-px-panel-key="{{ panel }}"
     aria-controls="{{ panel_id }}-panel-{{ panel }}"
     aria-selected="false"
     tabindex="-1"{{ extra_attrs_html }}>{{ content }}</div>
