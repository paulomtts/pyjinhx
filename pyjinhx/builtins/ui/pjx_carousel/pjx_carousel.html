<div id="{{ id }}" role="region" aria-roledescription="carousel" aria-label="{{ label }}" class="pjx-carousel{% if class_name %} {{ class_name }}{% endif %}" data-pjx-carousel{% if loop %} data-pjx-carousel-loop{% endif %}{% if autoplay %} data-pjx-carousel-autoplay data-pjx-carousel-interval="{{ interval_ms }}"{% endif %}><div class="pjx-carousel__track" tabindex="0">{{ content }}</div><button type="button" class="pjx-carousel__arrow pjx-carousel__arrow--prev" aria-label="{{ prev_label }}" data-pjx-carousel-prev><PJXIcon name="chevron-left"/></button><button type="button" class="pjx-carousel__arrow pjx-carousel__arrow--next" aria-label="{{ next_label }}" data-pjx-carousel-next><PJXIcon name="chevron-right"/></button><div class="pjx-carousel__dots" data-pjx-carousel-dots></div>{% if autoplay %}<button type="button" class="pjx-carousel__autoplay-toggle" aria-label="{{ autoplay_toggle_label }}" data-pjx-carousel-autoplay-toggle><PJXIcon name="pause" class_name="pjx-carousel__autoplay-icon-pause"/><PJXIcon name="play" class_name="pjx-carousel__autoplay-icon-play"/></button>{% endif %}</div>
