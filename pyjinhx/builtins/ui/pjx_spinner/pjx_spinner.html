<span id="{{ id }}"
      class="pjx-spinner pjx-spinner--{{ size }}{% if class_name %} {{ class_name }}{% endif %}"
      role="status"
      aria-live="polite"
      aria-busy="true">
  <span class="pjx-spinner__ring" aria-hidden="true"></span>
  <span class="pjx-spinner__label">{{ label }}</span>
</span>
