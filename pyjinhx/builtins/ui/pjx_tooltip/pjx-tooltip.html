<span class="pjx-tooltip{% if class_name %} {{ class_name }}{% endif %}" id="{{ id }}" data-pjx-tooltip-placement="{{ placement }}"{{ extra_attrs_html }}>
    <span class="pjx-tooltip__trigger" tabindex="0" aria-describedby="{{ id }}-tip">{{ trigger }}</span>
    <span class="pjx-tooltip__tip" id="{{ id }}-tip" role="tooltip" hidden>{{ tip }}</span>
</span>
