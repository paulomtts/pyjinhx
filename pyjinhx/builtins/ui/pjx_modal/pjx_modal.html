<dialog class="pjx-modal{% if class_name %} {{ class_name }}{% endif %}" id="{{ id }}"{% if open_on_mount %} data-pjx-open-on-mount{% endif %}{% if remove_on_close %} data-pjx-remove-on-close{% endif %}>
    <div class="pjx-modal__box">
        <header class="pjx-modal__header">
            {% if header %}
            {{ header }}
            {% else %}
            <span class="pjx-modal__title">{{ title }}</span>
            {% endif %}
            <button type="button" class="pjx-modal__close" data-pjx-close aria-label="{{ close_label }}">{{ close_content }}</button>
        </header>

        <div class="pjx-modal__body" id="{{ id }}-body">{{ body }}</div>

        {% if footer %}
        <footer class="pjx-modal__footer">{{ footer }}</footer>
        {% endif %}
    </div>
</dialog>
