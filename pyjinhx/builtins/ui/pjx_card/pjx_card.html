<article id="{{ id }}" class="pjx-card{% if class_name %} {{ class_name }}{% endif %}">
  {% if header or title %}
  <header class="pjx-card__header">
    {% if header %}
    {{ header }}
    {% else %}
    <h3 class="pjx-card__title">{{ title }}</h3>
    {% endif %}
  </header>
  {% endif %}
  <div class="pjx-card__body">{{ body }}</div>
  {% if footer %}
  <footer class="pjx-card__footer">{{ footer }}</footer>
  {% endif %}
</article>
