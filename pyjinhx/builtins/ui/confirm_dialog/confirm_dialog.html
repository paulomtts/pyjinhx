<dialog id="{{ id }}" class="px-confirm-dialog{% if class_name %} {{ class_name }}{% endif %}" data-px-dialog="confirm" aria-modal="true" aria-labelledby="{{ id }}-message"{% for k, v in extra_attrs.items() %} {{ k }}="{{ v }}"{% endfor %}>
    <div class="px-confirm-dialog__card">
        <p id="{{ id }}-message" class="px-confirm-dialog__message"></p>
        <div class="px-confirm-dialog__actions">
            <button type="button" class="px-confirm-dialog__cancel">{{ cancel_label }}</button>
            <button type="button" class="px-confirm-dialog__ok">{{ confirm_label }}</button>
        </div>
    </div>
</dialog>
