<div id="{{ id }}" class="px-region">
  {% for panel_key, panel_body in panels.items() %}
  <div class="px-region__panel"
       role="tabpanel"
       id="{{ id }}-panel-{{ panel_key }}"
       data-px-region-panel="{{ panel_key }}"
       {% if not loop.first %}hidden{% endif %}>{{ panel_body }}</div>
  {% endfor %}
</div>
