<div id="{{ id }}"
     class="px-avatar px-avatar--{{ size }}{% if class_name %} {{ class_name }}{% endif %}"{% if color %} style="background:{{ color }};"{% endif %}{{ extra_attrs_html }}>
  {% if src %}
  <img class="px-avatar__img" src="{{ src }}" alt="{{ alt }}" loading="lazy" decoding="async" />
  {% else %}
  <span class="px-avatar__initials" {% if alt %}title="{{ alt }}"{% endif %}>{{ initials or "?" }}</span>
  {% endif %}
</div>
