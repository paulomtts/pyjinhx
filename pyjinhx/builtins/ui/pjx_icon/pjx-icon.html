{% if svg_inner %}<svg id="{{ id }}" class="pjx-icon{% if class_name %} {{ class_name }}{% endif %}" width="{{ svg_size }}" height="{{ svg_size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="{{ stroke_width }}" stroke-linecap="round" stroke-linejoin="round"{% if label %} role="img"{% else %} aria-hidden="true"{% endif %}>{% if label %}<title>{{ label }}</title>{% endif %}{{ svg_inner|safe }}</svg>{# hidden span: renderer requires exactly one root element, so we can't emit empty output #}{% else %}<span id="{{ id }}" hidden></span>{% endif %}
