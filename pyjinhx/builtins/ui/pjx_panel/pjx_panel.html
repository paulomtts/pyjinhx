<div id="{{ id }}" class="pjx-panel{% if class_name %} {{ class_name }}{% endif %}">
  {% for panel_key, panel_body in panels.items() %}
  <div class="pjx-panel__panel"
       role="tabpanel"
       id="{{ id }}-panel-{{ panel_key }}"
       data-pjx-panel-key="{{ panel_key }}"
       data-pjx-region
       {% if not loop.first %}hidden{% endif %}>{{ panel_body }}</div>
  {% endfor %}
</div>
