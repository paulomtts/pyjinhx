<dialog class="pjx-drawer pjx-drawer--{{ side }}{% if class_name %} {{ class_name }}{% endif %}" id="{{ id }}"{% if open_on_mount %} data-pjx-open-on-mount{% endif %}{% if remove_on_close %} data-pjx-remove-on-close{% endif %}{{ extra_attrs_html }}>
    <div class="pjx-drawer__box">
        <header class="pjx-drawer__header">
            <span class="pjx-drawer__title">{{ title }}</span>
            <button type="button"
                    class="pjx-drawer__close"
                    data-pjx-close
                    aria-label="{{ close_label }}">{{ close_content }}</button>
        </header>
        <div class="pjx-drawer__body">{{ body }}</div>
        {% if footer %}
        <footer class="pjx-drawer__footer">{{ footer }}</footer>
        {% endif %}
    </div>
</dialog>
