<nav id="{{ id }}" class="pjx-paginator{% if class_name %} {{ class_name }}{% endif %}" aria-label="{{ aria_label }}"><ul class="pjx-paginator__list">{% for item in items %}<li class="pjx-paginator__item">{% if item.kind == 'ellipsis' %}<span class="pjx-paginator__ellipsis" aria-hidden="true">&hellip;</span>{% elif item.kind == 'current' %}<span class="pjx-paginator__link pjx-paginator__link--current" aria-current="page">{{ item.number }}</span>{% elif item.kind == 'page' %}<a class="pjx-paginator__link" href="{{ item.href }}"{% if target %} hx-get="{{ item.href }}" hx-target="{{ target }}" hx-swap="{{ swap }}"{% if push_url %} hx-push-url="true"{% endif %}{% endif %}>{{ item.number }}</a>{% elif item.kind == 'control' %}{% if item.disabled %}<span class="pjx-paginator__control pjx-paginator__control--{{ item.variant }} pjx-paginator__control--disabled" aria-disabled="true">{{ item.label }}</span>{% else %}<a class="pjx-paginator__control pjx-paginator__control--{{ item.variant }}" href="{{ item.href }}"{% if target %} hx-get="{{ item.href }}" hx-target="{{ target }}" hx-swap="{{ swap }}"{% if push_url %} hx-push-url="true"{% endif %}{% endif %}>{{ item.label }}</a>{% endif %}{% endif %}</li>{% endfor %}</ul></nav>
