<div class="px-dropdown{% if class_name %} {{ class_name }}{% endif %}" id="{{ id }}"{% if behavior %} data-px-popover{% endif %}{% if align == "end" %} data-px-align="end"{% endif %}{% for k, v in extra_attrs.items() %} {{ k }}="{{ v }}"{% endfor %}>
    <button type="button"
            class="px-dropdown__trigger"
            id="{{ id }}-trigger"
            aria-expanded="false"
            aria-haspopup="menu"
            aria-controls="{{ id }}-menu"
            {% if behavior %}data-px-toggle="{{ id }}-menu"{% endif %}>{{ trigger }}</button>
    <div class="px-dropdown__menu"
         id="{{ id }}-menu"
         data-px-popover-panel
         role="menu"
         aria-label="{{ menu_label }}"
         hidden>{% for item in items %}{{ item }}{% endfor %}</div>
</div>
