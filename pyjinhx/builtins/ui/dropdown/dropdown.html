<div class="px-dropdown{% if align == "end" %} px-dropdown--align-end{% endif %}{% if class_name %} {{ class_name }}{% endif %}" id="{{ id }}"{% if behavior %} data-px-popover{% endif %}{{ extra_attrs_html }}>
    <button type="button"
            class="px-dropdown__trigger"
            id="{{ id }}-trigger"
            aria-expanded="false"
            aria-haspopup="menu"
            aria-controls="{{ id }}-menu"
            {% if behavior %}data-px-toggle="{{ id }}-menu"{% endif %}>{{ trigger }}</button>
    <div class="px-dropdown__menu"
         id="{{ id }}-menu"
         {% if behavior %}data-px-popover-panel{% endif %}
         role="menu"
         aria-label="{{ menu_label }}"
         hidden>{% for item in items %}{{ item }}{% endfor %}</div>
</div>
