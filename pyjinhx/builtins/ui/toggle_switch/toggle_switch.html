<label id="{{ id }}" class="px-toggle-switch{% if class_name %} {{ class_name }}{% endif %}"{{ extra_attrs_html }}>
  <input type="checkbox" class="px-toggle-switch__input"{% if name %} name="{{ name }}"{% endif %} value="{{ value }}"{% if checked %} checked{% endif %}{% if disabled %} disabled{% endif %}>
  <span class="px-toggle-switch__track" aria-hidden="true"><span class="px-toggle-switch__thumb"></span></span>
  {% if label %}<span class="px-toggle-switch__label">{{ label }}</span>{% endif %}
</label>
