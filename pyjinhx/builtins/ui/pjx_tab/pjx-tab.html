<div id="{{ id }}" role="tab" class="pjx-tab{% if selected %} pjx-tab--selected{% endif %}{% if closeable and not pinned %} pjx-tab--closeable{% endif %}{% if pinned %} pjx-tab--pinned{% endif %}{% if class_name %} {{ class_name }}{% endif %}" tabindex="{% if selected %}0{% else %}-1{% endif %}" aria-selected="{% if selected %}true{% else %}false{% endif %}"{% if panel %} aria-controls="{{ panel }}"{% endif %} data-pjx-tab{% if pinned %} data-pjx-tab-pinned{% endif %}>{% if icon %}<PJXIcon name="{{ icon }}" class_name="pjx-tab__icon"/>{% endif %}<span class="pjx-tab__label">{{ content }}</span>{% if closeable and not pinned %}<button type="button" class="pjx-tab__close" aria-label="{{ close_label }}" data-pjx-tab-close>&times;</button>{% endif %}</div>
