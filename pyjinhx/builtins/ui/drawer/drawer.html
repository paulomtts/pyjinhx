<dialog class="px-drawer px-drawer--{{ side }}{% if class_name %} {{ class_name }}{% endif %}" id="{{ id }}"{% if open_on_mount %} data-px-open-on-mount{% endif %}{% if remove_on_close %} data-px-remove-on-close{% endif %}{{ extra_attrs_html }}>
    <div class="px-drawer__box">
        <header class="px-drawer__header">
            <span class="px-drawer__title">{{ title }}</span>
            <button type="button"
                    class="px-drawer__close"
                    data-px-close
                    aria-label="{{ close_label }}">{{ close_content }}</button>
        </header>
        <div class="px-drawer__body">{{ body }}</div>
        {% if footer %}
        <footer class="px-drawer__footer">{{ footer }}</footer>
        {% endif %}
    </div>
</dialog>
