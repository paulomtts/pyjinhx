site_name: PyJinHx
site_description: Build reusable, type-safe UI components for template-based web apps in Python
site_url: https://paulomtts.github.io/pyjinhx
repo_url: https://github.com/paulomtts/pyjinhx
repo_name: paulomtts/pyjinhx

exclude_docs: |
  __init__.py
  superpowers/
  hooks.py
  demos/

hooks:
  - docs/hooks.py

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Build an App: getting-started/build-an-app.md
  - Components: components.md
  - Guide:
      - Overview: guide/usage-tiers.md
      - Basic:
          - Creating Components: guide/components.md
          - PascalCase Tags: guide/tags.md
          - Nesting: guide/nesting.md
          - Asset Collection: guide/assets.md
      - Advanced:
          - Component Registry: guide/registry.md
          - Loading States: guide/loading.md
          - Reactivity: reactivity.md
          - Configuration: guide/configuration.md
          - Builtin Conventions: guide/builtin-conventions.md
          - Integrations:
              - FastAPI: integrations/fastapi.md
              - HTMX: integrations/htmx.md
              - WebAwesome: integrations/webawesome.md
              - Claude Code: integrations/claude-code.md
  - API Reference:
      - Public API:
          - Index: reference/public-api.md
          - BaseComponent: api/base-component.md
          - Reactive API: api/reactive-api.md
          - Renderer: api/renderer.md
          - Registry: api/registry.md
          - Configuration: api/config.md
          - Mutations, Keys & PjxContext: api/mutations-keys-context.md
      - Internals:
          - Parser & Tag: api/parser.md
          - Finder: api/finder.md
          - Assets API: api/assets-api.md
          - Client Backend: api/client-backend.md
          - Cache & Invalidation: api/cache-invalidation.md
          - Redis integration: api/integrations-redis.md
          - SQLite integration: api/integrations-sqlite.md
  - Migration guide: migration.md
  - Decisions:
      - Index: decisions/index.md
      - "0001: outerHTML-only OOB swaps": decisions/0001-outerhtml-only-oob-swaps.md

extra_css:
  - stylesheets/toc-collapse.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/paulomtts/pyjinhx
